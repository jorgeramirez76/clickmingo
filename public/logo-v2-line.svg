<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <!-- Continuous-line flamingo on the left -->
  <g transform="translate(50,30)" fill="none" stroke="#FF1F6B" stroke-width="5"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- one continuous-feel path: head, neck, body, leg -->
    <path d="
      M 130 28
      C 142 20, 155 30, 148 46
      C 145 56, 135 60, 130 56
      C 120 50, 115 58, 122 78
      C 130 100, 142 112, 138 132
      C 132 162, 90 180, 60 168
      C 35 158, 32 138, 50 124
      C 75 108, 110 120, 120 130
      M 95 165
      L 92 210
      M 92 210
      L 110 210
    "/>
    <!-- Beak -->
    <path d="M 145 32 L 168 40 L 152 48" stroke="#0A0E1A" stroke-width="5"/>
    <!-- Eye -->
    <circle cx="140" cy="32" r="1.8" fill="#0A0E1A" stroke="none"/>
  </g>

  <!-- Wordmark — clean geometric, tight tracking -->
  <g transform="translate(220,150)">
    <text font-family="'Inter', system-ui, sans-serif"
          font-weight="800"
          font-size="86"
          letter-spacing="-2.6"
          fill="#0A0E1A">Click<tspan fill="#FF1F6B">Mingo</tspan></text>
    <!-- Hairline pink rule under wordmark -->
    <line x1="6" y1="22" x2="200" y2="22" stroke="#FF1F6B" stroke-width="2"/>
    <text x="6" y="46"
          font-family="'Inter', system-ui, sans-serif"
          font-weight="500"
          font-size="13"
          letter-spacing="5"
          fill="#0A0E1A">REVENUE-FIRST WEB · APPS · MARKETING</text>
  </g>
</svg>
